        body {

        .leaderboard-card, .tab-btn, .modal-content {

        /* Animation for modals */
        .modal.hidden .modal-content {
            transform: scale(0.9);
            opacity: 0;
        }
        .modal .modal-content {
            transform: scale(1);
            opacity: 1;
        }
        .dragging {
            opacity: 0.5;
            background: #fef9c3;
        }
        .drag-over {
            border-top: 2px solid #F59E0B;
        }
        .draggable-item, .draggable-group {
            cursor: grab;
        }
        .draggable-item:active, .draggable-group:active {

        /* Grand celebration hero - symbols only, lightweight HTML/CSS, no Firebase writes */
        .spain-champion-banner {
            position: relative;
            isolation: isolate;
            overflow: hidden;
            min-height: 190px;
            border-radius: 2.25rem;
            border: 1px solid rgba(255, 255, 255, 0.68);
            background:
                radial-gradient(circle at 18% 8%, rgba(255, 255, 255, 0.85), transparent 24%),
                radial-gradient(circle at 80% 16%, rgba(255, 236, 153, 0.88), transparent 24%),
                linear-gradient(135deg, #7f1d1d 0%, #b91c1c 28%, #f59e0b 52%, #facc15 68%, #991b1b 100%);
            box-shadow:
                0 24px 60px rgba(120, 53, 15, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.70),
                inset 0 -1px 0 rgba(127, 29, 29, 0.22);
        }
        .spain-champion-banner::before {
            content: "";
            position: absolute;
            inset: 10px;
            z-index: -1;
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.38);
            background:
                linear-gradient(90deg, rgba(255,255,255,0.22), transparent 18%, rgba(255,255,255,0.18) 52%, transparent 82%),
                repeating-linear-gradient(135deg, rgba(255,255,255,0.13) 0 1px, transparent 1px 18px);
            opacity: 0.95;
            pointer-events: none;
        }
        .spain-champion-banner::after {
            content: "";
            position: absolute;
            width: 520px;
            height: 520px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: -2;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.54) 0 5%, rgba(255, 236, 153, 0.34) 18%, transparent 62%);
            pointer-events: none;
        }
        .celebration-stage {
            position: relative;
            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem 1rem;
        }
        .celebration-crown {
            position: relative;
            display: grid;
            place-items: center;
            width: 9.6rem;
            height: 9.6rem;
            border-radius: 999px;
            background:
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), rgba(255,255,255,0.28) 28%, transparent 42%),
                linear-gradient(135deg, rgba(255,255,255,0.74), rgba(255,248,196,0.50));
            box-shadow:
                0 22px 42px rgba(127, 29, 29, 0.26),
                inset 0 2px 0 rgba(255,255,255,0.72),
                inset 0 -12px 28px rgba(146, 64, 14, 0.12);
        }
        .celebration-crown::before,
        .celebration-crown::after {
            content: "";
            position: absolute;
            inset: -18px;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.34);
        }
        .celebration-crown::after {
            inset: -32px;
            border-color: rgba(255, 237, 167, 0.32);
            border-style: dashed;
        }
        .celebration-trophy {
            position: relative;
            z-index: 2;
            font-size: 5.15rem;
            line-height: 1;
            filter: drop-shadow(0 12px 12px rgba(127, 29, 29, 0.24));
            transform: translateY(-2px);
        }
        .celebration-flag {
            position: absolute;
            width: 7.8rem;
            height: 4.75rem;
            border-radius: 1.15rem;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.92);
            box-shadow: 0 16px 26px rgba(127, 29, 29, 0.22);
            transform: rotate(-7deg);
        }
        .celebration-flag.left {
            left: clamp(1rem, 7vw, 5.5rem);
            top: 2.3rem;
        }
        .celebration-flag.right {
            right: clamp(1rem, 7vw, 5.5rem);
            bottom: 2.1rem;
            transform: rotate(7deg);
        }
        .celebration-flag div:nth-child(1),
        .celebration-flag div:nth-child(3) { height: 25%; background: #aa151b; }
        .celebration-flag div:nth-child(2) { height: 50%; background: #f1bf00; }
        .celebration-orbit {
            position: absolute;
            display: grid;
            place-items: center;
            width: 4.7rem;
            height: 4.7rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.74);
            border: 1px solid rgba(255,255,255,0.68);
            box-shadow: 0 14px 28px rgba(127, 29, 29, 0.16), inset 0 1px 0 rgba(255,255,255,0.85);
            font-size: 2.35rem;
            line-height: 1;
        }
        .celebration-orbit.o1 { left: 20%; bottom: 1.55rem; }
        .celebration-orbit.o2 { right: 20%; top: 1.55rem; }
        .celebration-orbit.o3 { left: 32%; top: 1.3rem; width: 3.7rem; height: 3.7rem; font-size: 1.9rem; }
        .celebration-orbit.o4 { right: 32%; bottom: 1.25rem; width: 3.7rem; height: 3.7rem; font-size: 1.9rem; }
        .celebration-spark {
            position: absolute;
            display: block;
            width: 0.62rem;
            height: 0.62rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.85);
        }
        .celebration-spark.s1 { left: 12%; top: 28%; }
        .celebration-spark.s2 { left: 28%; bottom: 18%; background:#fde68a; }
        .celebration-spark.s3 { right: 14%; top: 35%; }
        .celebration-spark.s4 { right: 30%; bottom: 22%; background:#fde68a; }
        .celebration-spark.s5 { left: 50%; top: 9%; width: .46rem; height: .46rem; }
        .celebration-ribbon {
            position: absolute;
            left: 50%;
            bottom: 1rem;
            transform: translateX(-50%);
            width: min(76%, 540px);
            height: 0.55rem;
            border-radius: 999px;
            background: linear-gradient(90deg, #aa151b 0 28%, #f1bf00 28% 72%, #aa151b 72% 100%);
            box-shadow: 0 8px 18px rgba(120, 53, 15, 0.16);
        }
        @media (prefers-reduced-motion: no-preference) {
            .celebration-trophy { animation: trophyFloat 4.8s ease-in-out infinite; }
            .celebration-orbit { animation: symbolFloat 5.8s ease-in-out infinite; }
            .celebration-orbit.o2, .celebration-orbit.o4 { animation-delay: -2.4s; }
            .celebration-spark { animation: sparklePulse 2.8s ease-in-out infinite; }
            .celebration-spark.s2, .celebration-spark.s4 { animation-delay: -1.3s; }
        }
        @keyframes trophyFloat {
            0%, 100% { transform: translateY(-2px) scale(1); }
            50% { transform: translateY(-8px) scale(1.025); }
        }
        @keyframes symbolFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes sparklePulse {
            0%, 100% { transform: scale(0.75); opacity: 0.55; }
            50% { transform: scale(1.35); opacity: 1; }
        }
        @media (max-width: 640px) {
            .spain-champion-banner {
                min-height: 158px;
                border-radius: 1.55rem;
                margin-bottom: 1rem;
            }
            .spain-champion-banner::before { inset: 7px; border-radius: 1.25rem; }
            .celebration-stage { min-height: 142px; padding: 1rem 0.75rem; }
            .celebration-crown { width: 7.15rem; height: 7.15rem; }
            .celebration-crown::before { inset: -12px; }
            .celebration-crown::after { inset: -22px; }
            .celebration-trophy { font-size: 3.95rem; }
            .celebration-flag { width: 5.25rem; height: 3.25rem; border-radius: .85rem; border-width: 2px; }
            .celebration-flag.left { left: .72rem; top: 1.15rem; }
            .celebration-flag.right { right: .72rem; bottom: 1.12rem; }
            .celebration-orbit { width: 3.45rem; height: 3.45rem; font-size: 1.72rem; }
            .celebration-orbit.o1 { left: 17%; bottom: .85rem; }
            .celebration-orbit.o2 { right: 17%; top: .85rem; }
            .celebration-orbit.o3 { left: 34%; top: .55rem; width: 2.8rem; height: 2.8rem; font-size: 1.38rem; }
            .celebration-orbit.o4 { right: 34%; bottom: .55rem; width: 2.8rem; height: 2.8rem; font-size: 1.38rem; }
            .celebration-ribbon { width: 78%; height: .42rem; bottom: .65rem; }
            .celebration-spark.s1 { left: 10%; top: 42%; }
            .celebration-spark.s3 { right: 10%; top: 45%; }
        }


        /* Mobile layout fixes */
        html, body, #app {
            max-width: 100%;
            overflow-x: hidden;

        #headerActions button {

        /* ===== Professional interface refresh ===== */
        :root {
            --app-bg: #f3f6fa;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --ink: #172033;
            --muted: #64748b;
            --line: #dbe3ec;
            --primary: #17324d;
            --primary-soft: #eaf0f6;
            --accent: #c6972f;
            --accent-soft: #fbf6e8;
            --danger: #b42318;
            --radius-lg: 22px;
            --radius-md: 15px;
            --shadow-sm: 0 4px 14px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 14px 34px rgba(15, 23, 42, 0.09);
        }
        html { background: var(--app-bg); }
        body {
            font-family: 'Noto Sans Thai', 'Mitr', sans-serif !important;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 0%, rgba(198,151,47,.08), transparent 28rem),
                linear-gradient(180deg, #f8fafc 0%, var(--app-bg) 100%) !important;
            min-height: 100vh;
        }
        #app {
            max-width: 1240px !important;
            padding-top: 1.25rem !important;
            padding-bottom: 3rem !important;
        }
        header {
            text-align: left !important;
            background: rgba(255,255,255,.96);
            border: 1px solid var(--line);
            border-top: 5px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 1.4rem 1.6rem !important;
            box-shadow: var(--shadow-sm);
        }
        header h1 {
            color: var(--primary) !important;
            letter-spacing: -.025em;
            font-weight: 800 !important;
        }
        header p { color: var(--muted) !important; }
        #headerActions button {
            color: var(--primary) !important;
            border: 1px solid var(--line) !important;
            background: var(--surface) !important;
            box-shadow: none !important;
        }
        #headerActions button:hover { background: var(--primary-soft) !important; }

        nav {
            position: sticky;
            top: .5rem;
            z-index: 35;
            border: 1px solid var(--line) !important;
            border-radius: 18px;
            background: rgba(255,255,255,.94);
            backdrop-filter: blur(14px);
            padding: .5rem;
            gap: .35rem;
            box-shadow: var(--shadow-sm);
        }
        .tab-btn {
            border: 0 !important;
            border-radius: 12px !important;
            color: #405069;
            background: transparent;
            font-weight: 700 !important;
            transition: background .18s ease, color .18s ease, box-shadow .18s ease !important;
        }
        .tab-btn:hover { background: var(--primary-soft) !important; color: var(--primary) !important; }
        .tab-btn.active {
            color: #fff !important;
            background: var(--primary) !important;
            box-shadow: inset 0 -3px 0 var(--accent), 0 6px 16px rgba(23,50,77,.18);
        }
        .tab-content { animation: formalFade .18s ease-out; }
        @keyframes formalFade { from { opacity: .5; transform: translateY(3px); } to { opacity: 1; transform: none; } }

        .spain-champion-banner {
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
        }

        #leaderboard { gap: 1rem !important; }
        .leaderboard-card.team-card {
            position: relative;
            background: var(--surface) !important;
            border: 1px solid var(--line);
            border-left: 8px solid var(--team-accent, var(--primary));
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-sm) !important;
            cursor: pointer;
            outline: none;
            overflow: hidden;
            transform: translateZ(0);
        }
        .leaderboard-card.team-card::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(90deg, var(--team-tint, rgba(23,50,77,.05)), transparent 42%);
        }
        .leaderboard-card.team-card:hover {
            transform: translateY(-2px);
            border-color: #c7d2df;
            box-shadow: var(--shadow-md) !important;
        }
        .leaderboard-card.team-card:focus-visible { box-shadow: 0 0 0 4px rgba(23,50,77,.18), var(--shadow-md) !important; }
        .team-blue { --team-accent:#2f73d9; --team-tint:rgba(47,115,217,.10); }
        .team-green { --team-accent:#1e9b64; --team-tint:rgba(30,155,100,.10); }
        .team-yellow { --team-accent:#d69e00; --team-tint:rgba(214,158,0,.11); }
        .team-red { --team-accent:#d64545; --team-tint:rgba(214,69,69,.10); }
        .team-card.ring-4 { --tw-ring-shadow: 0 0 #0000 !important; }
        .leaderboard-mascot {
            border: 4px solid rgba(255,255,255,.9);
            box-shadow: 0 8px 22px rgba(15,23,42,.14) !important;
        }
        .leaderboard-team-name { color: var(--ink) !important; }
        .leaderboard-medal-pill {

            box-shadow: none !important;
        }
        .leaderboard-score-number { color: var(--primary) !important; }
        .leaderboard-score-label { color: var(--muted) !important; }
        .leaderboard-rank { color: #94a3b8 !important; }
        .team-card.ring-4 .leaderboard-rank { color: var(--accent) !important; }
        .team-details-hint {

        }
        input, textarea, select {

        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(23,50,77,.13) !important;
        }

        /* Team medal detail modal — formal, grouped and easy to scan */
        .team-detail-shell {
            border: 1px solid #cbd5e1 !important;
            border-radius: 22px !important;
            box-shadow: 0 28px 80px rgba(15,23,42,.28) !important;
        }

            <button data-tab="played" class="tab-btn text-lg font-semibold py-3 px-6 border-b-4 border-transparent hover:bg-amber-50 rounded-t-lg">แข่งขันเรียบร้อยแล้ว</button>
            <button data-tab="incomplete" class="tab-btn text-lg font-semibold py-3 px-6 border-b-4 border-transparent hover:bg-amber-50 rounded-t-lg">ยังไม่แข่งขัน/ไม่ครบ</button>
            <button data-tab="athletics" class="tab-btn text-lg font-semibold py-3 px-6 border-b-4 border-transparent hover:bg-amber-50 rounded-t-lg">กรีฑา</button>
            <button data-tab="summary" id="summary-tab-btn" class="tab-btn text-lg font-semibold py-3 px-6 border-b-4 border-transparent hover:bg-amber-50 rounded-t-lg">สรุปเหรียญ</button>
        </nav>

        <!-- Tab Content -->
        <div id="main-tab" class="tab-content active">


            <section id="spainChampionBanner" class="spain-champion-banner mb-6" aria-label="celebration symbols">
                <div class="celebration-stage" aria-hidden="true">
                    <span class="celebration-flag left"><div></div><div></div><div></div></span>
                    <span class="celebration-flag right"><div></div><div></div><div></div></span>
                    <span class="celebration-spark s1"></span>
                    <span class="celebration-spark s2"></span>
                    <span class="celebration-spark s3"></span>
                    <span class="celebration-spark s4"></span>
                    <span class="celebration-spark s5"></span>
                    <span class="celebration-orbit o1">⚽</span>
                    <span class="celebration-orbit o2">🎉</span>
                    <span class="celebration-orbit o3">⭐</span>
                    <span class="celebration-orbit o4">🇪🇸</span>
                    <span class="celebration-crown"><span class="celebration-trophy">🏆</span></span>
                    <span class="celebration-ribbon"></span>
                </div>
            </section>
            <main id="leaderboard" class="space-y-4 relative">
                <!-- Leaderboard cards will be dynamically inserted here -->
            </main>
        </div>

        <div id="sports-tab" class="tab-content">
            <div id="sports-table-container"></div>
        </div>

        <div id="played-tab" class="tab-content">
            <div id="played-sports-container"></div>
        </div>

        <div id="incomplete-tab" class="tab-content">
            <div id="incomplete-events-container"></div>
        </div>

        <div id="athletics-tab" class="tab-content">
            <div id="athletics-table-container"></div>
        </div>

        <div id="summary-tab" class="tab-content">
            <!-- Medal summary content will be injected here -->
        </div>
    </div>

    <!-- Team Medal Details Modal -->
    <div id="teamDetailsModal" class="modal fixed inset-0 bg-slate-950/55 flex justify-center items-center p-3 md:p-6 hidden z-[70]" aria-hidden="true">
        <div class="modal-content team-detail-shell bg-white w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div id="teamDetailsHeader" class="team-detail-header p-4 md:p-6 flex items-center gap-4">
                <div id="teamDetailsMascot" class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-4xl md:text-5xl shadow-sm flex-shrink-0"></div>
                <div class="min-w-0 flex-grow">
                    <div class="team-detail-kicker text-xs md:text-sm font-bold text-slate-500">สรุปรายการเหรียญรางวัล</div>
                    <h2 id="teamDetailsTitle" class="text-2xl md:text-3xl font-extrabold text-slate-900 truncate"></h2>
                    <p class="text-sm text-slate-500 mt-1">แยกตามประเภทเหรียญ พร้อมชื่อรายการ รุ่น และประเภทการแข่งขัน</p>
                </div>
                <button id="closeTeamDetailsBtn" type="button" class="w-10 h-10 rounded-xl border border-slate-200 bg-white hover:bg-slate-100 text-slate-600 text-2xl leading-none flex items-center justify-center flex-shrink-0" aria-label="ปิด">×</button>
            </div>
            <div class="p-4 md:p-6 overflow-y-auto">
                <div id="teamDetailsSummary" class="grid grid-cols-3 gap-2 md:gap-3 mb-5"></div>
                <div id="teamDetailsList"></div>
            </div>
        </div>
    </div>

        <!-- Update Toast Notification -->
    <div id="updateToast" class="fixed bottom-5 right-5 text-white py-3 px-6 rounded-full shadow-lg transform translate-y-20 opacity-0 transition-all duration-500 z-50">
        🔔 มีการอัปเดตข้อมูลล่าสุด!
    </div>

    

    <script type="module" src="script.min.js"></script>
</body>
</html>
